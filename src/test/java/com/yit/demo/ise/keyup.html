<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Underworld Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at center, #2b0000 0%, #000 70%);
    font-family:'Cormorant Garamond', serif;
    color:white;
    position:relative;
}

/* BLOOD MOON */
.moon{
    position:absolute;
    top:10%;
    left:50%;
    transform:translateX(-50%);
    width:300px;
    height:300px;
    background:radial-gradient(circle, #ff1a1a 0%, #8b0000 60%, transparent 70%);
    border-radius:50%;
    box-shadow:0 0 100px crimson;
    z-index:0;
}

/* Greek Pillars */
.pillar{
    position:absolute;
    bottom:0;
    width:120px;
    height:70%;
    background:linear-gradient(to bottom, #222, #111);
    box-shadow:0 0 20px black;
}

.pillar.left{ left:5%; }
.pillar.right{ right:5%; }

/* Fire Glow */
.fire{
    position:absolute;
    bottom:0;
    width:100%;
    height:200px;
    background: radial-gradient(circle at center, rgba(255,0,0,0.4), transparent 70%);
    animation:firePulse 4s infinite alternate;
}

@keyframes firePulse{
    from{ opacity:0.4; }
    to{ opacity:0.8; }
}

/* Main Content */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:2;
}

h1{
    font-family:'Cinzel', serif;
    font-size:60px;
    letter-spacing:4px;
    color:#ff3333;
    text-shadow:0 0 25px crimson;
}

.line{
    width:250px;
    height:2px;
    background:crimson;
    margin:20px auto;
    box-shadow:0 0 20px red;
}

p{
    max-width:600px;
    font-size:20px;
    line-height:1.6;
    color:#ffcccc;
}

/* Bats */
.bat{
    position:absolute;
    width:60px;
    opacity:0.8;
    animation:fly linear infinite;
}

@keyframes fly{
    0%{
        transform:translateX(-10vw) translateY(0);
        opacity:0;
    }
    20%{opacity:1;}
    100%{
        transform:translateX(110vw) translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="moon"></div>
<div class="pillar left"></div>
<div class="pillar right"></div>
<div class="fire"></div>

<div class="container">
    <h1>BORN OF THE UNDERWORLD</h1>
    <div class="line"></div>
    <p>
        On this night of crimson moonlight,  
        a god was born.  
        May your power rise like ancient fire,  
        feared by shadows, worshipped by destiny.  
        Happy Birthday.
    </p>
</div>

<script>
function createBat(){
    const bat = document.createElement("img");
    bat.src="https://upload.wikimedia.org/wikipedia/commons/1/16/Bat_silhouette.svg";
    bat.classList.add("bat");
    bat.style.top=Math.random()*50+"vh";
    bat.style.animationDuration=(8+Math.random()*10)+"s";
    document.body.appendChild(bat);
    setTimeout(()=>{bat.remove();},15000);
}
setInterval(createBat,700);
</script>

</body>
</html>
